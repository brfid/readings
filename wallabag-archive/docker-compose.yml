# Wallabag + PostgreSQL stack for bede (research/Q&A profile)
# Tailscale-only. Host: jean-claude (RPi 5 ARM64)
# Secrets in .env — keep out of version control

services:
  db:
    image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
    container_name: wallabag-db
    restart: unless-stopped
    mem_limit: 512M
    environment:
      POSTGRES_DB: wallabag
      POSTGRES_USER: wallabag
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /opt/wallabag/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallabag -d wallabag"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  wallabag:
    image: wallabag/wallabag:latest@sha256:4a527e027e0d59e87c14225ef11e005af3d4890374202ad319ce5e63dfc66709
    container_name: wallabag-app
    restart: unless-stopped
    mem_limit: 384M
    ports:
      - "127.0.0.1:8080:80"
    environment:
      SYMFONY__ENV__DATABASE_DRIVER: pdo_pgsql
      SYMFONY__ENV__DATABASE_HOST: db
      SYMFONY__ENV__DATABASE_PORT: "5432"
      SYMFONY__ENV__DATABASE_NAME: wallabag
      SYMFONY__ENV__DATABASE_USER: wallabag
      SYMFONY__ENV__DATABASE_PASSWORD: ${DB_PASSWORD}
      SYMFONY__ENV__DATABASE_CHARSET: utf8
      SYMFONY__ENV__DOMAIN_NAME: "https://raspberrypi.tailc4f7d6.ts.net"
      SYMFONY__ENV__SERVER_NAME: "Wallabag (bede)"
      SYMFONY__ENV__FOSUSER_REGISTRATION: "false"
      SYMFONY__ENV__FOSUSER_CONFIRMATION: "false"
      SYMFONY__ENV__SECRET: ${WALLABAG_SECRET}
      SYMFONY__ENV__LOCALE: en
    volumes:
      - /opt/wallabag/data/wallabag:/var/www/wallabag/data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
