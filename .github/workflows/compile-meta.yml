name: compile-meta

on:
  push:
    branches: [main]
    paths:
      - "reading.yaml"
      - "scripts/compile_meta.py"
      - ".github/workflows/compile-meta.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install pyyaml

      - name: Validate reading.yaml
        run: python reads.py validate

      - name: Compile meta.json files
        run: python scripts/compile_meta.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- 'texts/**/meta.json'; then
            echo "no meta.json changes"
            exit 0
          fi
          git add 'texts/**/meta.json'
          git commit -m "compile meta.json"
          git push